<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Classic Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.3em;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            background: #f0f0f0;
            font-weight: bold;
            transition: all 0.3s;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #333;
            padding: 10px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border: none;
            font-size: 4em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', monospace;
            border-radius: 10px;
        }

        .cell:hover:not(.disabled) {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        .cell.X {
            color: #667eea;
        }

        .cell.O {
            color: #764ba2;
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .winning-cell {
            background: #a5d6a7 !important;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 10px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .score {
            text-align: center;
        }

        .score h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .score p {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .reset-btn {
            background: #ff6b6b;
            margin-left: 10px;
        }

        .mode-selector {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .mode-btn {
            background: #ddd;
            color: #333;
            padding: 8px 20px;
            font-size: 0.9em;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        @media (max-width: 500px) {
            .cell {
                font-size: 2.5em;
            }
            .game-container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Tic-Tac-Toe</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="2p">👥 2 Players</button>
            <button class="mode-btn" data-mode="ai">🤖 vs Computer</button>
        </div>

        <div class="scoreboard">
            <div class="score">
                <h3>Player X</h3>
                <p id="scoreX">0</p>
            </div>
            <div class="score">
                <h3>Draws</h3>
                <p id="scoreDraw">0</p>
            </div>
            <div class="score">
                <h3>Player O</h3>
                <p id="scoreO">0</p>
            </div>
        </div>

        <div class="status" id="status">
            Player X's turn
        </div>

        <div class="board" id="board">
            <!-- 3x3 grid will be generated by JS -->
        </div>

        <div>
            <button id="resetBtn">🔄 New Game</button>
            <button id="resetScoreBtn" class="reset-btn">📊 Reset Scores</button>
        </div>
    </div>
</body>
</html>
