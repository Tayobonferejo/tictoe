<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Classic Game</title>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Tic-Tac-Toe</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="2p">👥 2 Players</button>
            <button class="mode-btn" data-mode="ai">🤖 vs Computer</button>
        </div>

        <div class="scoreboard">
            <div class="score">
                <h3>Player X</h3>
                <p id="scoreX">0</p>
            </div>
            <div class="score">
                <h3>Draws</h3>
                <p id="scoreDraw">0</p>
            </div>
            <div class="score">
                <h3>Player O</h3>
                <p id="scoreO">0</p>
            </div>
        </div>

        <div class="status" id="status">
            Player X's turn
        </div>

        <div class="board" id="board">
            <!-- 3x3 grid will be generated by JS -->
        </div>

        <div>
            <button id="resetBtn">🔄 New Game</button>
            <button id="resetScoreBtn" class="reset-btn">📊 Reset Scores</button>
        </div>
    </div>
</body>
</html>
